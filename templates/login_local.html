<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login CBN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #003d99; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { width: 350px; border-radius: 15px; padding: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div class="card text-center">
        <h4 class="fw-bold text-primary mb-4">Painel CBN</h4>
        <input type="text" id="u" class="form-control mb-2" placeholder="Usuário">
        <input type="password" id="s" class="form-control mb-3" placeholder="Senha">
        <button onclick="login()" class="btn btn-primary w-100">ENTRAR</button>
        <p id="msg" class="text-danger mt-2 small"></p>
    </div>
    <script>
        async function login() {
            const r = await fetch('/login', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email:document.getElementById('u').value, senha:document.getElementById('s').value})});
            const res = await r.json();
            if(res.status === 'sucesso') window.location.href = '/painel';
            else document.getElementById('msg').innerText = res.msg;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gestão CBN - Faturamento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .concluida { background: #f8f9fa; opacity: 0.6; text-decoration: line-through; }
        .header-cbn { background: #003d99; color: white; border-bottom: 4px solid #ffc107; padding: 15px; }
        .secao-medico { background: #fff3cd; border: 1px solid #ffeeba; border-radius: 10px; padding: 15px; }
    </style>
</head>
<body class="bg-light">
    <div class="header-cbn mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <h4 class="m-0">📍 Painel Integral - CBN</h4>
            <div>{{ user_email }} | <a href="/logout" class="btn btn-sm btn-outline-light">Sair</a></div>
        </div>
    </div>

    <div class="container">
        <div class="row">
            <div class="col-md-8">
                <div class="card p-4 mb-4 shadow-sm">
                    <h6 class="fw-bold text-primary">📤 ENVIAR TAREFA (PAINEL OU EXTENSÃO)</h6>
                    <div class="row g-2 mt-2">
                        <div class="col-md-6"><input type="text" id="t-nome" class="form-control" placeholder="Descrição da tarefa..."></div>
                        <div class="col-md-3"><input type="datetime-local" id="t-data" class="form-control" onchange="validarData(this.value)"></div>
                        <div class="col-md-3"><select id="t-resp" class="form-select"><option value="">Responsável</option></select></div>
                        <div class="col-md-12 text-end mt-2"><button onclick="salvarTarefa()" class="btn btn-primary px-4">ENVIAR E MONITORAR</button></div>
                    </div>
                </div>

                <div class="card p-3 shadow-sm">
                    <h6 class="fw-bold mb-3">📋 ACOMPANHAMENTO DE EXECUÇÃO</h6>
                    <table class="table align-middle small">
                        <thead><tr><th>Status</th><th>Tarefa</th><th>Prazo</th><th>Resp.</th><th>Ação</th></tr></thead>
                        <tbody id="corpo-tarefas"></tbody>
                    </table>
                </div>
            </div>

            <div class="col-md-4">
                <div class="secao-medico shadow-sm">
                    <h6 class="fw-bold text-warning-emphasis">🩺 COBRANÇA DE MÉDICOS</h6>
                    <div id="lista-medicos-cobranca" class="mt-3">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function validarData(v) {
            const r = await fetch('/verificar_data', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({data:v})});
            const d = await r.json();
            if(d.mensagem) alert("🗓️ IA: " + d.mensagem);
        }

        async function carregarTudo() {
            const rT = await fetch('/listar');
            const tarefas = await rT.json();
            const corpo = document.getElementById('corpo-tarefas');
            corpo.innerHTML = '';
            tarefas.forEach(t => {
                const isC = t.status === 1;
                corpo.innerHTML += `<tr class="${isC?'concluida':''}">
                    <td><input type="checkbox" ${isC?'checked':''} onclick="status(${t.id}, ${isC?0:1})"></td>
                    <td><b>${t.tarefa}</b><br><small>Por: ${t.autor}</small></td>
                    <td>${t.data}</td>
                    <td><span class="badge bg-secondary">${t.nome_resp || 'Geral'}</span></td>
                    <td>${!isC && t.zap_resp ? `<button onclick="zap('${t.zap_resp}', '${t.tarefa}')" class="btn btn-sm btn-success">Zap</button>` : ''}</td>
                </tr>`;
            });

            const rM = await fetch('/listar_medicos');
            const medicos = await rM.json();
            const divM = document.getElementById('lista-medicos-cobranca');
            divM.innerHTML = '';
            medicos.forEach(m => {
                divM.innerHTML += `<div class="bg-white p-2 mb-2 rounded border d-flex justify-content-between align-items-center">
                    <small><b>Dr. ${m.nome}</b><br>CRM: ${m.crm}</small>
                    <button onclick="zapMedico('${m.zap}', '${m.nome}')" class="btn btn-sm btn-primary">Solicitar</button>
                </div>`;
            });
        }

        async function salvarTarefa() {
            const d = {tarefa: document.getElementById('t-nome').value, data: new Date(document.getElementById('t-data').value).toLocaleString('pt-BR').replace(',',''), responsavel_id: document.getElementById('t-resp').value};
            await fetch('/salvar', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(d)});
            location.reload();
        }

        function zap(n, m) { window.open(`https://api.whatsapp.com/send?phone=55${n}&text=${encodeURIComponent('🚨 Alerta CBN: ' + m)}`, '_blank'); }
        function zapMedico(n, nome) { window.open(`https://api.whatsapp.com/send?phone=55${n}&text=${encodeURIComponent('Prezado Dr. ' + nome + ', solicitamos o envio do relatório mensal de produção para o faturamento CBN. Atenciosamente, Daniel.')}`, '_blank'); }
        async function status(id, s) { await fetch(`/atualizar_status/${id}`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status:s})}); carregarTudo(); }

        carregarTudo();
        setInterval(carregarTudo, 30000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Integral - CBN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .concluida { background: #f8f9fa; opacity: 0.6; text-decoration: line-through; }
        .header-cbn { background: #003d99; color: white; border-bottom: 4px solid #ffc107; padding: 15px; }
        .secao-medico { background: #fff3cd; border-radius: 10px; padding: 15px; border: 1px solid #ffeeba; }
        .sessao-config { background: #e9ecef; border-radius: 10px; padding: 20px; margin-top: 40px; margin-bottom: 50px; }
        .agenda-lista { max-height: 250px; overflow-y: auto; background: white; border-radius: 5px; }
    </style>
</head>
<body class="bg-light">
    <div class="header-cbn mb-4 shadow-sm">
        <div class="container d-flex justify-content-between align-items-center">
            <h4 class="m-0">📍 Painel Integral - CBN</h4>
            <div><strong>{{ user_nome }}</strong> | <a href="/logout" class="btn btn-sm btn-outline-light ms-2">Sair</a></div>
        </div>
    </div>

    <div class="container">
        <div class="row">
            <div class="col-md-8">
                <div class="card p-4 mb-4 shadow-sm">
                    <h6 class="fw-bold text-primary">📤 AGENDAR TAREFA</h6>
                    <div class="row g-2 mt-2">
                        <div class="col-md-6"><input type="text" id="t-nome" class="form-control" placeholder="Descrição..."></div>
                        <div class="col-md-3"><input type="datetime-local" id="t-data" class="form-control" onchange="validarData(this.value)"></div>
                        <div class="col-md-3"><select id="t-resp" class="form-select"><option value="">Responsável</option></select></div>
                        <div class="col-md-12 text-end mt-2"><button onclick="salvarTarefa()" class="btn btn-primary px-4">SALVAR</button></div>
                    </div>
                </div>

                <div class="card p-3 shadow-sm">
                    <h6 class="fw-bold mb-3">📋 TAREFAS ATIVAS</h6>
                    <table class="table align-middle small">
                        <thead><tr><th>Status</th><th>Tarefa</th><th>Prazo</th><th>Resp.</th><th>Ação</th></tr></thead>
                        <tbody id="corpo-tarefas"></tbody>
                    </table>
                </div>
            </div>

            <div class="col-md-4">
                <div class="secao-medico shadow-sm mb-4">
                    <h6 class="fw-bold text-dark">🩺 COBRANÇA DE MÉDICOS</h6>
                    
                    <div class="mt-2 mb-3">
                        <label class="small fw-bold text-muted">Texto do WhatsApp:</label>
                        <textarea id="msg-padrao-medico" class="form-control form-control-sm" rows="3">Prezado(a) Dr(a). {nome}, o faturamento da CBN solicita o envio do relatório mensal de produção. Atenciosamente, Daniel.</textarea>
                    </div>

                    <div id="lista-medicos-cobranca"></div>
                </div>
            </div>
        </div>

        <div class="sessao-config shadow-sm">
            <h5 class="fw-bold mb-4 text-secondary">⚙️ GESTÃO DE CADASTROS</h5>
            <div class="row">
                <div class="col-md-4 border-end">
                    <h6 class="fw-bold">👥 Novo Membro</h6>
                    <input type="text" id="eq-nome" class="form-control mb-2" placeholder="Nome">
                    <input type="text" id="eq-user" class="form-control mb-2" placeholder="Login">
                    <input type="password" id="eq-senha" class="form-control mb-2" placeholder="Senha">
                    <input type="text" id="eq-zap" class="form-control mb-2" placeholder="WhatsApp (DDD+Num)">
                    <button onclick="cadastrarEquipe()" class="btn btn-sm btn-dark w-100">CADASTRAR</button>
                </div>
                
                <div class="col-md-4 border-end px-4">
                    <h6 class="fw-bold">📋 Agenda da Equipe</h6>
                    <div class="agenda-lista border p-2 shadow-sm" id="corpo-equipe"></div>
                </div>

                <div class="col-md-4">
                    <h6 class="fw-bold">🩺 Novo Médico</h6>
                    <input type="text" id="med-nome" class="form-control mb-2" placeholder="Nome do Médico">
                    <input type="text" id="med-crm" class="form-control mb-2" placeholder="CRM">
                    <input type="text" id="med-zap" class="form-control mb-2" placeholder="WhatsApp">
                    <button onclick="cadastrarMedico()" class="btn btn-sm btn-warning w-100">SALVAR MÉDICO</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function validarData(v) {
            const r = await fetch('/verificar_data', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({data:v})});
            const d = await r.json();
            if(d.mensagem) alert("⚠️ IA: " + d.mensagem);
        }

        async function carregarTudo() {
            // Tarefas
            const rT = await fetch('/listar');
            const tarefas = await rT.json();
            const corpo = document.getElementById('corpo-tarefas');
            corpo.innerHTML = '';
            tarefas.forEach(t => {
                const isC = t.status === 1;
                corpo.innerHTML += `<tr class="${isC?'concluida':''}">
                    <td><input type="checkbox" ${isC?'checked':''} onclick="status(${t.id}, ${isC?0:1})"></td>
                    <td><b>${t.tarefa}</b><br><small>Por: ${t.autor}</small></td>
                    <td>${t.data}</td>
                    <td><span class="badge bg-secondary">${t.nome_resp || 'Geral'}</span></td>
                    <td>${!isC && t.zap_resp ? `<button onclick="zap('${t.zap_resp}', '${t.tarefa}')" class="btn btn-sm btn-success py-0">Zap</button>` : ''}</td>
                </tr>`;
            });

            // Médicos
            const rM = await fetch('/listar_medicos');
            const medicos = await rM.json();
            const divM = document.getElementById('lista-medicos-cobranca');
            divM.innerHTML = medicos.length ? '' : '<p class="text-muted small">Vazio.</p>';
            medicos.forEach(m => {
                divM.innerHTML += `<div class="bg-white p-2 mb-2 rounded border d-flex justify-content-between align-items-center shadow-sm">
                    <small><b>Dr. ${m.nome}</b></small>
                    <div>
                        <button onclick="zapMedico('${m.zap}', '${m.nome}')" class="btn btn-sm btn-primary py-0">Zap</button>
                        <button onclick="removerMedico(${m.id})" class="btn btn-sm btn-link text-danger p-0 ms-1" title="Excluir">🗑️</button>
                    </div>
                </div>`;
            });

            // Equipe
            const rE = await fetch('/listar_equipe_completa');
            const equipe = await rE.json();
            const select = document.getElementById('t-resp');
            const agenda = document.getElementById('corpo-equipe');
            select.innerHTML = '<option value="">Responsável</option>';
            agenda.innerHTML = '';
            equipe.forEach(e => {
                select.innerHTML += `<option value="${e.id}">${e.nome}</option>`;
                agenda.innerHTML += `<div class="d-flex justify-content-between align-items-center mb-1 border-bottom pb-1">
                    <small style="font-size: 0.75rem"><b>${e.nome}</b></small>
                    <div>
                        <button onclick="zap('${e.whatsapp}', 'Olá!')" class="btn btn-sm p-0 text-success">📞</button>
                        <button onclick="removerEquipe(${e.id})" class="btn btn-sm p-0 text-danger ms-2" title="Remover">×</button>
                    </div>
                </div>`;
            });
        }

        function zapMedico(n, nome) {
            let texto = document.getElementById('msg-padrao-medico').value;
            texto = texto.replace('{nome}', nome);
            window.open(`https://api.whatsapp.com/send?phone=55${n}&text=${encodeURIComponent(texto)}`, '_blank');
        }

        async function cadastrarMedico() {
            const d = {nome: document.getElementById('med-nome').value, crm: document.getElementById('med-crm').value, whatsapp: document.getElementById('med-zap').value};
            await fetch('/cadastrar_medico', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(d)});
            location.reload();
        }

        async function removerMedico(id) {
            if(confirm("Excluir este médico permanentemente?")) {
                await fetch(`/deletar_medico/${id}`, {method:'DELETE'});
                carregarTudo();
            }
        }

        async function cadastrarEquipe() {
            const d = {nome: document.getElementById('eq-nome').value, usuario: document.getElementById('eq-user').value, senha: document.getElementById('eq-senha').value, whatsapp: document.getElementById('eq-zap').value};
            await fetch('/cadastrar_equipe', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(d)});
            location.reload();
        }

        async function removerEquipe(id) {
            if(confirm("Remover este membro da equipe?")) {
                await fetch(`/deletar_equipe/${id}`, {method:'DELETE'});
                carregarTudo();
            }
        }

        async function salvarTarefa() {
            const val = document.getElementById('t-data').value;
            const d = {tarefa: document.getElementById('t-nome').value, data: val ? new Date(val).toLocaleString('pt-BR').replace(',','') : '', responsavel_id: document.getElementById('t-resp').value};
            await fetch('/salvar', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(d)});
            location.reload();
        }

        function zap(n, m) { window.open(`https://api.whatsapp.com/send?phone=55${n}&text=${encodeURIComponent(m)}`, '_blank'); }
        async function status(id, s) { await fetch(`/atualizar_status/${id}`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status:s})}); carregarTudo(); }

        carregarTudo();
        setInterval(carregarTudo, 30000);
    </script>
</body>
</html>

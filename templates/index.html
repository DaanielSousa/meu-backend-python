<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Faturamento - Nefrologia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .navbar { background-color: #0d6efd; }
        .card { border: none; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Sistema de Faturamento</span>
            <div class="d-flex align-items-center">
                <span class="text-white me-3">Logado como: <strong>{{ user_email }}</strong></span>
                <a href="/logout" class="btn btn-outline-light btn-sm">Sair</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="card p-4">
            <h4 class="mb-4 text-primary">Histórico de Atividades (Extensão)</h4>
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-light">
                        <tr>
                            <th>Tarefa / Procedimento</th>
                            <th>Data e Hora</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-tarefas">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Função que busca as tarefas no seu servidor Render
        async function carregarTarefas() {
            try {
                const response = await fetch('/listar');
                const tarefas = await response.json();
                const tabela = document.getElementById('tabela-tarefas');
                
                tabela.innerHTML = ''; 
                tarefas.forEach(t => {
                    tabela.innerHTML += `
                        <tr>
                            <td>${t.tarefa}</td>
                            <td>${t.data}</td>
                        </tr>
                    `;
                });
            } catch (error) {
                console.error("Erro ao carregar tarefas:", error);
            }
        }

        // Atualiza a lista a cada 10 segundos
        carregarTarefas();
        setInterval(carregarTarefas, 10000);
    </script>
</body>
</html>

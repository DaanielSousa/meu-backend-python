<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Faturamento CBN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: #003d99; border-bottom: 3px solid #ffc107; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .concluida { background-color: #e9ecef; opacity: 0.7; text-decoration: line-through; }
        .autor-tag { color: #003d99; font-weight: bold; font-size: 0.8rem; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark mb-4 p-3">
        <div class="container d-flex justify-content-between align-items-center">
            <span class="navbar-brand h4 m-0">📍 Central de Faturamento</span>
            <div class="text-white">
                <span class="me-3 small d-none d-md-inline">Logado: <strong>{{ user_email }}</strong></span>
                <a href="/logout" class="btn btn-outline-light btn-sm">Sair</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="card p-4 mb-4">
            <h6 class="text-uppercase text-muted fw-bold mb-3">Novo Lembrete de Faturamento</h6>
            <div class="row g-2">
                <div class="col-md-6"><input type="text" id="nova-tarefa" class="form-control" placeholder="O que agendar?"></div>
                <div class="col-md-4"><input type="datetime-local" id="data-tarefa" class="form-control"></div>
                <div class="col-md-2"><button onclick="adicionarTarefa()" class="btn btn-primary w-100 fw-bold">SALVAR</button></div>
            </div>
            <p class="text-danger small mt-2 mb-0">* Clique em qualquer lugar da tela ao abrir para ativar os alertas sonoros.</p>
        </div>

        <div class="row">
            <div class="col-md-7">
                <div class="card p-3 mb-4 border-top border-warning border-4">
                    <h5 class="fw-bold text-warning mb-3">⏳ PENDENTES / ALERTAS</h5>
                    <div id="lista-ativas"></div>
                </div>
            </div>
            <div class="col-md-5">
                <div class="card p-3 border-top border-success border-4">
                    <h5 class="fw-bold text-success mb-3">✅ CONCLUÍDAS</h5>
                    <div id="lista-historico"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let alertasVistos = new Set();

        // Solicita permissão de notificação do Windows logo de cara
        if (Notification.permission !== "granted") {
            Notification.requestPermission();
        }

        async function carregar() {
            try {
                const resp = await fetch('/listar');
                const tarefas = await resp.json();
                const ativas = document.getElementById('lista-ativas');
                const historico = document.getElementById('lista-historico');
                
                ativas.innerHTML = ''; historico.innerHTML = '';
                
                // Formato idêntico ao salvo no banco para comparação
                const agora = new Date().toLocaleString('pt-BR', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'}).replace(',', '');

                tarefas.forEach(t => {
                    const itemHtml = `
                        <div class="d-flex align-items-center p-2 mb-2 border-bottom ${t.status === 1 ? 'concluida' : ''}">
                            <input type="checkbox" class="form-check-input me-3" ${t.status === 1 ? 'checked' : ''} onclick="toggle(${t.id}, this.checked)">
                            <div class="flex-grow-1">
                                <div class="fw-bold">${t.tarefa}</div>
                                <small class="text-muted">${t.data} | <span class="autor-tag">${t.autor.split('@')[0]}</span></small>
                            </div>
                        </div>
                    `;

                    if (t.status === 0) {
                        if (t.data === agora && !alertasVistos.has(t.id)) {
                            alertasVistos.add(t.id);
                            dispararAlertaCompleto(t.tarefa, t.id);
                        } else {
                            ativas.innerHTML += itemHtml;
                        }
                    } else {
                        historico.innerHTML += itemHtml;
                    }
                });
            } catch (e) { console.log("Erro ao buscar tarefas."); }
        }

        function dispararAlertaCompleto(msg, id) {
            // 1. Som (Usando um link mais estável)
            const audio = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
            audio.play().catch(e => console.log("Áudio bloqueado pelo navegador. Clique na página!"));

            // 2. Notificação do Windows (Aparece fora do navegador)
            if (Notification.permission === "granted") {
                new Notification("ALERTA CBN: Faturamento", {
                    body: msg,
                    icon: "https://cdn-icons-png.flaticon.com/512/179/179386.png"
                });
            }

            // 3. Popup na página (Trava até dar OK)
            setTimeout(async () => {
                alert("⏰ HORA DO FATURAMENTO:\n\n" + msg);
                
                // Após o OK, move para concluído
                await fetch(`/atualizar_status/${id}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ status: 1 })
                });
                carregar();
            }, 500);
        }

        async function adicionarTarefa() {
            const t = document.getElementById('nova-tarefa');
            const d = document.getElementById('data-tarefa');
            if(!t.value || !d.value) return alert("Preencha a descrição e o horário!");

            const dataFormatada = new Date(d.value).toLocaleString('pt-BR', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'}).replace(',', '');

            await fetch('/salvar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ tarefa: t.value, data: dataFormatada })
            });
            t.value = ''; d.value = ''; carregar();
        }

        async function toggle(id, check) {
            await fetch(`/atualizar_status/${id}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ status: check ? 1 : 0 })
            });
            carregar();
        }

        carregar();
        setInterval(carregar, 10000); // Checa a cada 10 segundos para ser mais preciso
    </script>
</body>
</html>

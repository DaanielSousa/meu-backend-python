<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - CBN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #4a2c2a; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { width: 320px; border-radius: 15px; padding: 25px; }
    </style>
</head>
<body>
    <div class="card text-center">
        <h4 class="fw-bold" style="color: #4a2c2a">PAINEL CBN</h4>
        <p class="text-muted small">Gestão Integrada</p>
        <input type="text" id="u" class="form-control mb-2" placeholder="Usuário">
        <input type="password" id="s" class="form-control mb-3" placeholder="Senha">
        <button onclick="entrar()" class="btn btn-dark w-100 fw-bold">ENTRAR</button>
        <div id="err" class="text-danger mt-2 small"></div>
    </div>
    <script>
        async function entrar() {
            const r = await fetch('/login', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email:document.getElementById('u').value, senha:document.getElementById('s').value})});
            const res = await r.json();
            if(res.status === 'sucesso') window.location.href = '/painel';
            else document.getElementById('err').innerText = res.msg;
        }
    </script>
</body>
</html>

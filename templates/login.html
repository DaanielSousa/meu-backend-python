<!DOCTYPE html>
<html lang="pt-br">
<head><meta charset="UTF-8"><title>CBN OMNI - Acesso</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>body { background: #4a2c2a; display: flex; align-items: center; justify-content: center; height: 100vh; color: #4a2c2a; }</style>
</head>
<body>
    <div class="card p-4 shadow-lg" style="width: 320px; border-radius: 20px;">
        <h4 class="text-center fw-bold mb-1">CBN OMNI</h4>
        <p class="text-center small text-muted mb-4">Gestão Operacional Integrada</p>
        <input type="text" id="u" class="form-control mb-2" placeholder="Usuário">
        <input type="password" id="s" class="form-control mb-3" placeholder="Senha">
        <button onclick="entrar()" class="btn btn-dark w-100 fw-bold py-2">ACESSAR SISTEMA</button>
    </div>
    <script>
        async function entrar() {
            const r = await fetch('/login', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email:document.getElementById('u').value, senha:document.getElementById('s').value})});
            if(r.ok) window.location.href = '/painel';
            else alert("Credenciais Inválidas");
        }
    </script>
</body>
</html>
